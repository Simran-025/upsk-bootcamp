name: CI Pipeline

on:
  push:
    branches: 
      - '**' # Triggers on ALL branches so tests always run

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # FIX 2: Enables caching to prevent pipeline slowdowns

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt

      - name: Run linter
        run: pip install ruff && ruff check api/

      - name: Run tests
        run: pip install pytest && pytest api/

  docker-build:
    runs-on: ubuntu-latest
    needs: test 
    if: github.ref == 'refs/heads/main' # FIX 3: Ensures images are only built on the main branch
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t upsk-bootcamp ./api