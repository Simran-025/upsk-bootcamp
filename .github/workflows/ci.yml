name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt
      
      - name: Run linter
        run: pip install ruff && ruff check api/
      
      - name: Run tests
        run: pip install pytest && pytest api/

  docker-build:
    runs-on: ubuntu-latest
    needs: test # Only build if tests pass
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        # Builds the image using the Dockerfile provided in the api folder
        run: docker build -t upsk-bootcamp ./api